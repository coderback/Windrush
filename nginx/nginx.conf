events {}
http {
  upstream frontend { server frontend:3000; }
  upstream api { server api:8000; }

  server {
    listen 80;

    # SSE route — buffering MUST be disabled
    # /api/stream → http://api/stream (strip /api prefix)
    location /api/stream {
      proxy_pass http://api/stream;
      proxy_buffering off;
      proxy_cache off;
      proxy_set_header Connection '';
      proxy_http_version 1.1;
      proxy_read_timeout 300s;
    }

    # /api/apply — SSE, long timeout for browser automation + user pause
    location /api/apply {
      proxy_pass http://api/apply;
      proxy_buffering off;
      proxy_cache off;
      proxy_set_header Connection '';
      proxy_http_version 1.1;
      proxy_read_timeout 600s;
    }

    # /api/browser-input — short POST to relay user instructions into browser session
    location /api/browser-input/ {
      proxy_pass http://api/browser-input/;
      proxy_set_header Host $host;
    }

    # /api/apply → http://api/apply, /api/health → http://api/health, etc.
    location /api/ {
      proxy_pass http://api/;
      proxy_set_header Host $host;
    }

    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
    }
  }
}
