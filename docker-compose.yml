version: "3.9"
services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [frontend, api]

  frontend:
    build: ./frontend
    expose: ["3000"]
    environment:
      - NEXT_PUBLIC_API_URL=/api

  api:
    build: ./api
    expose: ["8000"]
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ECONOMIC_INDEX_PATH=/data/economic_index.json
    volumes:
      - economic_data:/data:ro

volumes:
  economic_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data
