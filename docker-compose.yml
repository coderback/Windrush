version: "3.9"
services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [frontend, api]

  frontend:
    build: ./frontend
    expose: ["3000"]
    environment:
      - NEXT_PUBLIC_API_URL=/api

  api:
    build: ./api
    expose: ["8000"]
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ECONOMIC_INDEX_PATH=/data/economic_index.json
      - TASK_PENETRATION_PATH=/data/task_penetration.csv
      - ADZUNA_APP_ID=${ADZUNA_APP_ID}
      - ADZUNA_API_KEY=${ADZUNA_API_KEY}
      - JOB_EMAIL=${JOB_EMAIL}
      - JOB_PASSWORD=${JOB_PASSWORD}
      - JOBS_MCP_URL=http://civic-guardrails:8002/mcp
    volumes:
      - economic_data:/data:ro
    depends_on: [jobs-mcp, civic-guardrails]

  jobs-mcp:
    build: ./jobs-mcp
    expose: ["8001"]
    environment:
      - ADZUNA_APP_ID=${ADZUNA_APP_ID}
      - ADZUNA_API_KEY=${ADZUNA_API_KEY}
      - FASTMCP_HOST=0.0.0.0
      - FASTMCP_PORT=8001

  civic-guardrails:
    build: ./civic-guardrails
    expose: ["8002"]
    environment:
      - UPSTREAM_MCP_URL=http://jobs-mcp:8001/mcp
      - AUDIT_LOG_PATH=/logs/audit.jsonl
      - PORT=8002
    volumes:
      - guardrail_logs:/logs
    depends_on: [jobs-mcp]

volumes:
  economic_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data
  guardrail_logs:
